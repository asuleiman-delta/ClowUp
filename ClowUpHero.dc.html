<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
[data-cu-hero] *{box-sizing:border-box;}
@keyframes cuFloatH{0%,100%{transform:translateY(0) rotate(var(--r,0deg))}50%{transform:translateY(-18px) rotate(var(--r,0deg))}}
@keyframes cuTwinkleH{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
@media(max-width:980px){ [data-hero-dice]{opacity:.32 !important;} }
@media(max-width:680px){ [data-hero-dice]{display:none !important;} }
</style>
</helmet>
<header data-cu-hero="" style="position:relative;padding:150px 24px 62px;background:radial-gradient(110% 100% at 66% 46%,#1b305362 0%,#0c1b32 46%,#0A1628 100%);overflow:hidden;font-family:'Manrope',system-ui,sans-serif;">
  <div data-hero-dice="" aria-hidden="true" style="position:absolute;top:0;right:0;width:48%;height:100%;pointer-events:none;">
    <div style="position:absolute;top:46%;right:26%;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(201,147,10,.24),rgba(43,142,240,.1) 48%,transparent 72%);filter:blur(6px);"></div>
    <img src="assets/dice/w5.png" alt="" style="position:absolute;top:42%;right:38%;width:124px;height:auto;filter:drop-shadow(0 18px 26px rgba(0,0,0,.5));--r:-12deg;animation:cuFloatH 7s ease-in-out infinite;">
    <img src="assets/dice/b3.png" alt="" style="position:absolute;top:66%;right:21%;width:92px;height:auto;filter:drop-shadow(0 16px 22px rgba(0,0,0,.5));--r:9deg;animation:cuFloatH 8.4s ease-in-out infinite .8s;">
    <img src="assets/dice/c2.png" alt="" style="position:absolute;top:32%;right:27%;width:66px;height:auto;filter:drop-shadow(0 14px 20px rgba(0,0,0,.45));--r:6deg;animation:cuFloatH 6.2s ease-in-out infinite .4s;">
    <span style="position:absolute;top:34%;right:46%;width:6px;height:6px;border-radius:50%;background:#E6C77A;box-shadow:0 0 14px 3px rgba(201,147,10,.7);animation:cuTwinkleH 3.6s ease-in-out infinite;"></span>
    <span style="position:absolute;top:64%;right:38%;width:5px;height:5px;border-radius:50%;background:#8FC2F5;box-shadow:0 0 12px 3px rgba(43,142,240,.6);animation:cuTwinkleH 4.2s ease-in-out infinite .7s;"></span>
    <span style="position:absolute;top:46%;right:7%;width:5px;height:5px;border-radius:50%;background:#9FE0AB;box-shadow:0 0 12px 3px rgba(123,211,137,.55);animation:cuTwinkleH 3.9s ease-in-out infinite 1.2s;"></span>
  </div>
  <div style="max-width:1200px;margin:0 auto;position:relative;z-index:2;">
    <div style="display:inline-flex;align-items:center;gap:9px;padding:7px 15px;border:1px solid rgba(201,147,10,.35);border-radius:999px;background:rgba(201,147,10,.07);margin-bottom:20px;">
      <span style="width:6px;height:6px;border-radius:50%;background:#C9930A;"></span>
      <span style="font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#E6C77A;">{{ eyebrow }}</span>
    </div>
    <h1 style="font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(34px,5.2vw,60px);line-height:1.05;letter-spacing:-.025em;margin:0 0 18px;color:#fff;max-width:760px;text-wrap:balance;">{{ title }}</h1>
    <p style="font-size:clamp(15px,1.8vw,19px);line-height:1.6;color:#A0AEC0;max-width:580px;margin:0;text-wrap:pretty;">{{ subtitle }}</p>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 360 },
  &quot;eyebrow&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Catálogo de sorteos&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;title&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Todos los sorteos&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;subtitle&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Cada mes sorteamos premios reales entre nuestros miembros.&quot;, &quot;tsType&quot;: &quot;string&quot; }
}"></script>
</body>
</html>
