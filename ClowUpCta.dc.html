<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
[data-cu-cta] a{text-decoration:none;}
@keyframes cuKenC{0%{transform:scale(1.04) translate(0,0)}100%{transform:scale(1.12) translate(-1.5%,-1%)}}
@keyframes cuTwinkleC{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
@keyframes cuPulseC{0%{box-shadow:0 0 0 0 rgba(123,211,137,.55)}70%{box-shadow:0 0 0 9px rgba(123,211,137,0)}100%{box-shadow:0 0 0 0 rgba(123,211,137,0)}}
</style>
</helmet>
<section style="padding:clamp(48px,7vw,80px) 24px;font-family:'Manrope',system-ui,sans-serif;">
  <div style="max-width:1140px;margin:0 auto;position:relative;border-radius:28px;overflow:hidden;background:#0A1628;border:1px solid rgba(201,147,10,.3);min-height:clamp(480px,52vw,580px);">
    <img src="assets/cta-bg.jpg" alt="" aria-hidden="true" style="position:absolute;inset:-6%;width:112%;height:112%;object-fit:cover;object-position:center top;transform:scale(1.04);animation:cuKenC 18s ease-in-out infinite alternate;">
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,22,40,0) 28%,rgba(10,22,40,.55) 52%,rgba(10,22,40,.9) 76%,#0A1628 100%);"></div>
    <div aria-hidden="true" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;">
      <span style="position:absolute;top:22%;left:14%;width:7px;height:7px;border-radius:50%;background:#E6C77A;box-shadow:0 0 14px 3px rgba(201,147,10,.7);animation:cuTwinkleC 3.6s ease-in-out infinite;"></span>
      <span style="position:absolute;top:64%;left:8%;width:5px;height:5px;border-radius:50%;background:#8FC2F5;box-shadow:0 0 12px 3px rgba(43,142,240,.6);animation:cuTwinkleC 4.2s ease-in-out infinite .7s;"></span>
      <span style="position:absolute;top:38%;left:38%;width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 12px 3px rgba(255,255,255,.6);animation:cuTwinkleC 3.1s ease-in-out infinite 1.2s;"></span>
      <span style="position:absolute;top:78%;left:30%;width:6px;height:6px;border-radius:50%;background:#E6C77A;box-shadow:0 0 14px 3px rgba(201,147,10,.6);animation:cuTwinkleC 4.6s ease-in-out infinite .4s;"></span>
      <span style="position:absolute;top:14%;left:46%;width:4px;height:4px;border-radius:50%;background:#9FE0AB;box-shadow:0 0 10px 3px rgba(123,211,137,.55);animation:cuTwinkleC 3.9s ease-in-out infinite 1.6s;"></span>
    </div>
    <div style="position:relative;min-height:inherit;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;text-align:center;padding:clamp(40px,6vw,64px) clamp(24px,5vw,56px) clamp(44px,6vw,68px);">
      <div style="display:inline-flex;align-items:center;gap:9px;padding:9px 18px;border:1px solid rgba(201,147,10,.5);border-radius:999px;background:rgba(8,16,28,.55);backdrop-filter:blur(12px) saturate(1.1);-webkit-backdrop-filter:blur(12px) saturate(1.1);box-shadow:0 6px 20px rgba(0,0,0,.3);margin-bottom:22px;">
        <span style="width:8px;height:8px;border-radius:50%;background:#7BD389;animation:cuPulseC 1.8s ease-out infinite;"></span>
        <span style="font-size:12.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#E6C77A;">{{ eyebrow }}</span>
      </div>
      <h2 style="font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(32px,4.6vw,56px);letter-spacing:-.025em;margin:0 0 16px;text-wrap:balance;color:#fff;">{{ title }}</h2>
      <p style="font-size:clamp(15px,1.8vw,18.5px);line-height:1.6;color:#D8C9A0;max-width:480px;margin:0 auto 34px;text-wrap:pretty;">{{ subtitle }}</p>
      <a href="Planes.dc.html" style="display:inline-block;background:linear-gradient(135deg,#E8B53A,#C9930A);color:#0A1628;font-family:'Sora',sans-serif;font-weight:800;font-size:17px;letter-spacing:.01em;padding:18px 40px;border-radius:13px;box-shadow:0 14px 38px rgba(0,0,0,.35);transition:transform .2s,box-shadow .2s,filter .2s;" style-hover="transform:translateY(-3px) scale(1.02);filter:brightness(1.08);box-shadow:0 20px 48px rgba(201,147,10,.45);">{{ ctaLabel }}</a>
    </div>
  </div>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1140, &quot;height&quot;: 560 },
  &quot;eyebrow&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Sorteo en curso · cupos limitados&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;title&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Empieza a ganar hoy&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;subtitle&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Una membresía. Sorteos cada mes, beneficios reales y una comunidad que crece contigo.&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;ctaLabel&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Quiero ser miembro&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">class Component extends DCLogic {
  renderVals() {
    return {
      eyebrow: this.props.eyebrow ?? 'Sorteo en curso · cupos limitados',
      title: this.props.title ?? 'Empieza a ganar hoy',
      subtitle: this.props.subtitle ?? 'Una membresía. Sorteos cada mes, beneficios reales y una comunidad que crece contigo.',
      ctaLabel: this.props.ctaLabel ?? 'Quiero ser miembro',
    };
  }
}</script>
</body>
</html>
